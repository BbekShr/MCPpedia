name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # labeled/unlabeled included so the guard job re-evaluates when a human
    # toggles the human-approved label.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  ci:
    name: Type-check / Lint / Test
    runs-on: ubuntu-latest
    # Cap wall-clock so a stalled build-time fetch (e.g. next/font/google
    # fonts, which have no timeout in production builds) fails the job in
    # minutes instead of hanging for GitHub's 6-hour default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        # Runs env-less ON PURPOSE — do not add placeholder Supabase env vars.
        # Without env, the Supabase factories fall back to mock clients
        # (lib/supabase/server.ts, public.ts, client.ts) and build-time DB
        # callers skip fetching. A placeholder URL like
        # https://placeholder.supabase.co would defeat those guards and make
        # prerender attempt real network calls, failing or slowing the build.
        run: npm run build

  # Governance gate: fails any PR that touches a protected path (CLAUDE.md §5)
  # unless a human has added the `human-approved` label. Agents never add that
  # label and never merge; a red guard means "hand to human".
  guard:
    name: Protected-path guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      HUMAN_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'human-approved') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check protected paths
        run: |
          set -euo pipefail
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --quiet
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          # Keep this regex in sync with the protected-paths list in CLAUDE.md §5.
          PROTECTED='^(CLAUDE\.md|AGENTS\.md|\.github/workflows/|\.env|proxy\.ts|lib/supabase/|lib/validators\.ts|lib/rate-limit\.ts|supabase/migrations/|__tests__/|lib/__tests__/)'
          VIOLATIONS=$(echo "$CHANGED" | grep -E "$PROTECTED" || true)
          if [ -n "$VIOLATIONS" ] && [ "$HUMAN_APPROVED" != "true" ]; then
            echo ""
            echo "::error::PR touches protected path(s) without the human-approved label:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "Guard: OK (protected paths touched: $([ -n "$VIOLATIONS" ] && echo 'yes, human-approved' || echo 'none'))"
