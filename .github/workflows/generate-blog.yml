name: Blog Generator

on:
  schedule:
    - cron: '0 9 * * 2'  # Tuesday 9am UTC / 4am CST (after scores at 3am)
    - cron: '0 9 * * 4'  # Thursday 9am UTC / 4am CST
  workflow_dispatch:

# Serialize every workflow that pushes to main so their push windows don't
# overlap. Combined with the rebase-retry push below, this eliminates the
# non-fast-forward rejections that emailed spurious "workflow failed" notices.
concurrency:
  group: content-push-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # 1) Plan the article(s) (0-2) and emit a prompt file per article. Touches
      #    only Supabase — no model call. Sets job_count + model_<i> outputs.
      - name: Prepare blog jobs
        id: prep
        run: npx tsx bots/generate-blog.ts --prepare
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 2) Generate each planned article with the Claude Code action. This bills
      #    a Claude subscription via CLAUDE_CODE_OAUTH_TOKEN instead of Anthropic
      #    API credits — generate it locally with `claude setup-token` (Pro/Max)
      #    and store it as the CLAUDE_CODE_OAUTH_TOKEN repository secret. Up to
      #    two articles per run, each on its planned model.
      # @main, not @beta: the beta ref pins Claude Code 1.0.88, which rejects
      # OAuth tokens minted by current CLI versions (401 invalid bearer token).
      # main also renamed the allowed_tools/model inputs into claude_args.
      - name: Generate article 0 with Claude (subscription)
        if: steps.prep.outputs.job_count == '1' || steps.prep.outputs.job_count == '2'
        uses: anthropics/claude-code-base-action@main
        timeout-minutes: 15
        with:
          prompt_file: blog-work/prompt-0.txt
          claude_args: "--allowedTools Write --model ${{ steps.prep.outputs.model_0 }}"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Generate article 1 with Claude (subscription)
        if: steps.prep.outputs.job_count == '2'
        uses: anthropics/claude-code-base-action@main
        timeout-minutes: 15
        with:
          prompt_file: blog-work/prompt-1.txt
          claude_args: "--allowedTools Write --model ${{ steps.prep.outputs.model_1 }}"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # 3) Turn the generated prose back into MDX posts and update .meta.json.
      - name: Finalize articles
        if: steps.prep.outputs.job_count == '1' || steps.prep.outputs.job_count == '2'
        run: npx tsx bots/generate-blog.ts --finalize
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit and push new posts
        if: steps.prep.outputs.job_count == '1' || steps.prep.outputs.job_count == '2'
        run: |
          git config user.name "mcppedia-bot"
          git config user.email "bot@mcppedia.org"
          git add content/blog/
          git diff --cached --quiet && echo "No new posts generated" && exit 0
          git commit -m "blog: auto-generate articles [bot]"
          # Rebase-retry: other bot workflows push to main too, so a push can be
          # rejected (non-fast-forward) if main moved since checkout. Rebase onto
          # the latest and retry instead of failing the job — the old plain
          # `git push` emailed a spurious failure even when the content was fine.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/main"
            git pull --rebase --autostash origin main || true
          done
          echo "Push still failing after 5 attempts"
          exit 1
