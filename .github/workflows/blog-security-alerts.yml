name: Blog Security Alerts

on:
  schedule:
    - cron: '30 9 * * *'  # Daily 9:30am UTC / 4:30am CST (after score computation)
  workflow_dispatch:

# Serialize every workflow that pushes to main so their push windows don't
# overlap. Combined with the rebase-retry push below, this eliminates the
# non-fast-forward rejections that emailed spurious "workflow failed" notices.
concurrency:
  group: content-push-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for security alerts and publish if found
        run: npx tsx bots/generate-blog.ts --security-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if new alerts
        run: |
          git config user.name "mcppedia-bot"
          git config user.email "bot@mcppedia.org"
          git add content/blog/
          git diff --cached --quiet && echo "No security alerts to publish" && exit 0
          git commit -m "blog: security alert [bot]"
          # Rebase-retry: other bot workflows push to main too, so a push can be
          # rejected (non-fast-forward) if main moved since checkout. Rebase onto
          # the latest and retry instead of failing the job — the old plain
          # `git push` emailed a spurious failure even when the content was fine.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/main"
            git pull --rebase --autostash origin main || true
          done
          echo "Push still failing after 5 attempts"
          exit 1
