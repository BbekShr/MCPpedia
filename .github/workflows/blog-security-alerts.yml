name: Blog Security Alerts

on:
  schedule:
    - cron: '30 9 * * *'  # Daily 9:30am UTC / 4:30am CST (after score computation)
  workflow_dispatch:

# Serialize every workflow that pushes to main so their push windows don't
# overlap. Combined with the rebase-retry push below, this eliminates the
# non-fast-forward rejections that emailed spurious "workflow failed" notices.
concurrency:
  group: content-push-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # 1) Decide whether there's a new security advisory worth publishing.
      #    This only touches Supabase — no model call — and emits a prompt file
      #    (job 0) for the Claude Code step below when (and only when) there's an
      #    alert. Sets job_count + model_0 outputs.
      - name: Prepare security alert job
        id: prep
        run: npx tsx bots/generate-blog.ts --security-only --prepare
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 2) Generate the article with the Claude Code action. This bills a Claude
      #    subscription via CLAUDE_CODE_OAUTH_TOKEN instead of Anthropic API
      #    credits, so there's no ANTHROPIC_API_KEY here. Generate `claude
      #    setup-token` locally (Pro/Max) and store the result as the
      #    CLAUDE_CODE_OAUTH_TOKEN repository secret. Runs only when step 1 found
      #    something to publish.
      - name: Generate article with Claude (subscription)
        if: steps.prep.outputs.job_count == '1'
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: blog-work/prompt-0.txt
          allowed_tools: "Write"
          model: ${{ steps.prep.outputs.model_0 }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # 3) Turn the generated prose back into a proper MDX post and record the
      #    covered CVEs in .meta.json so tomorrow's run doesn't republish them.
      - name: Finalize article
        if: steps.prep.outputs.job_count == '1'
        run: npx tsx bots/generate-blog.ts --security-only --finalize
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit and push if new alerts
        if: steps.prep.outputs.job_count == '1'
        run: |
          git config user.name "mcppedia-bot"
          git config user.email "bot@mcppedia.org"
          git add content/blog/
          git diff --cached --quiet && echo "No security alerts to publish" && exit 0
          git commit -m "blog: security alert [bot]"
          # Rebase-retry: other bot workflows push to main too, so a push can be
          # rejected (non-fast-forward) if main moved since checkout. Rebase onto
          # the latest and retry instead of failing the job — the old plain
          # `git push` emailed a spurious failure even when the content was fine.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/main"
            git pull --rebase --autostash origin main || true
          done
          echo "Push still failing after 5 attempts"
          exit 1
