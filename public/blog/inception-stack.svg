<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" rx="20" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="800" height="900" rx="20" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="3">THE INCEPTION STACK</text>
  <line x1="300" y1="65" x2="500" y2="65" stroke="#334155" stroke-width="1"/>

  <!-- LAYER 1: YOU -->
  <g filter="url(#shadow)">
    <rect x="100" y="90" width="600" height="110" rx="16" fill="#0f172a" stroke="url(#layer1)" stroke-width="2"/>
    <rect x="100" y="90" width="600" height="110" rx="16" fill="#1e3a5f" opacity="0.4"/>
  </g>
  <!-- Glow dot -->
  <circle cx="140" cy="115" r="6" fill="#3b82f6" filter="url(#glow2)"/>
  <circle cx="140" cy="115" r="3" fill="#93c5fd"/>
  <text x="160" y="120" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2">LAYER 1</text>
  <text x="260" y="120" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">YOU</text>
  <text x="400" y="158" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">"Find me a safe database MCP server"</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="200" x2="400" y2="240" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="392,236 400,250 408,236" fill="#3b82f6"/>

  <!-- LAYER 2: AI -->
  <g filter="url(#shadow)">
    <rect x="100" y="250" width="600" height="110" rx="16" fill="#0f172a" stroke="url(#layer2)" stroke-width="2"/>
    <rect x="100" y="250" width="600" height="110" rx="16" fill="#2d1f5e" opacity="0.3"/>
  </g>
  <circle cx="140" cy="275" r="6" fill="#8b5cf6" filter="url(#glow2)"/>
  <circle cx="140" cy="275" r="3" fill="#c4b5fd"/>
  <text x="160" y="280" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2">LAYER 2</text>
  <text x="260" y="280" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">YOUR AI (Claude, Cursor, Windsurf)</text>
  <text x="400" y="315" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sees MCPpedia tool in its toolkit</text>
  <text x="400" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">Decides to call <tspan fill="#c4b5fd" font-weight="600">search_servers</tspan></text>

  <!-- Arrow 2 -->
  <line x1="400" y1="360" x2="400" y2="400" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="392,396 400,410 408,396" fill="#8b5cf6"/>

  <!-- LAYER 3: MCP SERVER -->
  <g filter="url(#shadow)">
    <rect x="100" y="410" width="600" height="130" rx="16" fill="#0f172a" stroke="url(#layer3)" stroke-width="2"/>
    <rect x="100" y="410" width="600" height="130" rx="16" fill="#422006" opacity="0.3"/>
  </g>
  <circle cx="140" cy="435" r="6" fill="#f59e0b" filter="url(#glow2)"/>
  <circle cx="140" cy="435" r="3" fill="#fcd34d"/>
  <text x="160" y="440" fill="#fcd34d" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2">LAYER 3</text>
  <text x="260" y="440" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">MCPpedia MCP SERVER</text>
  <text x="400" y="478" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Queries the MCPpedia API</text>
  <!-- Tool pills -->
  <rect x="175" y="496" width="110" height="26" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="230" y="513" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11">search</text>
  <rect x="295" y="496" width="110" height="26" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="350" y="513" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11">security</text>
  <rect x="415" y="496" width="110" height="26" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="470" y="513" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11">compare</text>
  <rect x="535" y="496" width="110" height="26" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="590" y="513" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="11">trending</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="540" x2="400" y2="580" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="392,576 400,590 408,576" fill="#f59e0b"/>

  <!-- LAYER 4: DATABASE -->
  <g filter="url(#shadow)">
    <rect x="100" y="590" width="600" height="120" rx="16" fill="#0f172a" stroke="url(#layer4)" stroke-width="2"/>
    <rect x="100" y="590" width="600" height="120" rx="16" fill="#052e16" opacity="0.3"/>
  </g>
  <circle cx="140" cy="615" r="6" fill="#10b981" filter="url(#glow2)"/>
  <circle cx="140" cy="615" r="3" fill="#6ee7b7"/>
  <text x="160" y="620" fill="#6ee7b7" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2">LAYER 4</text>
  <text x="260" y="620" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">MCPpedia DATABASE</text>
  <text x="400" y="658" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">17,000+ servers scored across 5 dimensions</text>
  <text x="400" y="685" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, -apple-system, sans-serif" font-size="13">CVE scanning  &#8226;  Tool poisoning detection  &#8226;  Token efficiency  &#8226;  Health checks</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="710" x2="400" y2="750" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="392,746 400,760 408,746" fill="#22c55e"/>

  <!-- RESULT -->
  <g filter="url(#shadow)">
    <rect x="100" y="760" width="600" height="130" rx="16" fill="#052e16" stroke="url(#result)" stroke-width="2.5"/>
  </g>
  <!-- Checkmark circle -->
  <circle cx="150" cy="825" r="22" fill="#16a34a" opacity="0.3"/>
  <circle cx="150" cy="825" r="16" fill="#22c55e"/>
  <path d="M141 825 L147 831 L159 819" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="185" y="790" fill="#86efac" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="2">RESULT — RANKED, SCORED, EVIDENCE-BACKED</text>

  <!-- Result row 1 -->
  <text x="185" y="817" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">1. Supabase MCP</text>
  <rect x="345" y="803" width="62" height="20" rx="10" fill="#22c55e" opacity="0.25"/>
  <text x="376" y="817" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="12" font-weight="700">95/100</text>
  <text x="420" y="817" fill="#6ee7b7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Official, 2,587 stars, Grade A</text>

  <!-- Result row 2 -->
  <text x="185" y="843" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">2. MongoDB MCP</text>
  <rect x="345" y="829" width="62" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="376" y="843" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="700">91/100</text>
  <text x="420" y="843" fill="#6ee7b7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Official, 993 stars, 36K dl/wk</text>

  <!-- Result row 3 -->
  <text x="185" y="869" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">3. Query MCP</text>
  <rect x="345" y="855" width="62" height="20" rx="10" fill="#22c55e" opacity="0.1"/>
  <text x="376" y="869" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="12" font-weight="700">80/100</text>
  <text x="420" y="869" fill="#4ade80" font-family="system-ui, -apple-system, sans-serif" font-size="12">Community, 817 stars</text>
</svg>
